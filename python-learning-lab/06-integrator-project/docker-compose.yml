services:

  # ─────────────────────────────────────────────
  # PostgreSQL — main relational database
  # Used in: 02-databases, 06-integrator-project
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: lab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lab_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lab_password}
      POSTGRES_DB: ${POSTGRES_DB:-lab_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init/postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lab_user} -d ${POSTGRES_DB:-lab_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # MongoDB — document database
  # Used in: 02-databases, 06-integrator-project
  # ─────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: lab-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-lab_user}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-lab_password}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-lab_db}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./init/mongo:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Redis — cache and pub/sub
  # Used in: 02-databases, 04-data-engineering
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: lab-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-lab_password}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD:-lab_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Mongo Express — MongoDB UI (development only)
  # Access at: http://localhost:8081
  # ─────────────────────────────────────────────
  mongo-express:
    image: mongo-express:1
    container_name: lab-mongo-express
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USER:-lab_user}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD:-lab_password}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_USER:-lab_user}:${MONGO_PASSWORD:-lab_password}@mongodb:27017/
      ME_CONFIG_BASICAUTH: false
    ports:
      - "8081:8081"
    profiles:
      - tools  # only starts with: docker compose --profile tools up

  # ─────────────────────────────────────────────
  # pgAdmin — PostgreSQL UI (development only)
  # Access at: http://localhost:5050
  # ─────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: lab-pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@lab.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-lab_password}
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    profiles:
      - tools  # only starts with: docker compose --profile tools up

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  pgadmin_data:

networks:
  default:
    name: lab-network